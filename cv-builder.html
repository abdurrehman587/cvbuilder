<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 100%;
            margin: 0;
            padding: 20px;
            width: 100%;
        }

        /* Header Styles */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 60px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .header-content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            color: white;
            flex: 1;
            text-align: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .cv-builder-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-section h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .welcome-section p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #dee2e6;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .cv-preview-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 2px dashed #dee2e6;
        }

        .cv-preview-section h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .cv-preview {
            min-height: 200px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #dee2e6;
        }

        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>📄 Professional CV Builder</h1>
                <div class="user-info">
                    <span id="userName">Guest User</span>
                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </div>

        <div class="cv-builder-content">
            <div class="welcome-section">
                <h2>Welcome to CV Builder</h2>
                <p>Create your professional CV with our easy-to-use builder</p>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="startNewCV()">📝 Start New CV</button>
                    <button class="btn btn-secondary" onclick="loadExistingCV()">📂 Load Existing CV</button>
                    <button class="btn btn-secondary" onclick="goToAdmin()">🎯 Admin Dashboard</button>
                </div>
            </div>

            <div class="cv-preview-section" id="cvPreviewSection" style="display: none;">
                <h3>CV Preview</h3>
                <div class="cv-preview" id="cvPreview">
                    <!-- CV content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // CV Builder JavaScript Functions
        function startNewCV() {
            alert('Starting new CV creation... This feature will be implemented with the full CV builder.');
        }
        
        function loadExistingCV() {
            alert('Loading existing CV... This feature will be implemented with database integration.');
        }
        
        function goToAdmin() {
            window.location.href = '/admin';
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/auth';
            }
        }
        
        // Initialize CV Builder
        document.addEventListener('DOMContentLoaded', function() {
            console.log('CV Builder loaded');
        });
    </script>
</body>
</html>
