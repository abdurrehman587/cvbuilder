<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Professional CV Builder</h1>
        <p>Create stunning, professional CVs with our advanced CV builder. Choose from multiple templates and customize every detail to match your style.</p>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading CV Builder...</p>
        </div>
        
        <div id="buttons">
            <a href="/frontend/index.html" class="btn" onclick="showLoading()">🚀 Start Building CV</a>
            <a href="/admin" class="btn">🎯 Admin Dashboard</a>
            <a href="/auth" class="btn">🔐 Login</a>
        </div>
    </div>

    <script>
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('buttons').style.display = 'none';
        }
        
        // Auto-redirect after 3 seconds if user doesn't click
        setTimeout(function() {
            if (!document.getElementById('loading').style.display || document.getElementById('loading').style.display === 'none') {
                showLoading();
                setTimeout(function() {
                    window.location.href = '/frontend/index.html';
                }, 1000);
            }
        }, 3000);
    </script>
</body>
</html>
