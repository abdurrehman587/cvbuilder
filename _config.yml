# GitHub Pages Configuration
# This file configures Jekyll for GitHub Pages

# Site settings
title: "CV Builder"
description: "Professional CV Builder with Multi-User Support"
author: "Abdur Rehman"
email: "abdurrehman587@gmail.com"
url: "https://abdurrehman587.github.io/cvbuilder"
baseurl: "/cvbuilder"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Exclude files from processing
exclude:
  - README.md
  - .gitignore
  - .github/
  - node_modules/
  - package.json
  - package-lock.json

# Include files
include:
  - _redirects

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
