<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>API Test Page</h1>
    <button onclick="testHealth()">Test Health API</button>
    <button onclick="testPDF()">Test PDF API</button>
    <div id="results"></div>

    <script>
        async function testHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                document.getElementById('results').innerHTML = `
                    <h3>Health API Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <h3>Health API Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        async function testPDF() {
            try {
                const testHTML = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Test PDF</title>
                    </head>
                    <body>
                        <h1>Test PDF Generation</h1>
                        <p>This is a test PDF generated by the API.</p>
                    </body>
                    </html>
                `;

                const response = await fetch('/api/generate-pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        html: testHTML,
                        filename: 'test.pdf'
                    }),
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'test.pdf';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    
                    document.getElementById('results').innerHTML = `
                        <h3>PDF API Success:</h3>
                        <p>PDF generated and downloaded successfully!</p>
                    `;
                } else {
                    const errorText = await response.text();
                    document.getElementById('results').innerHTML = `
                        <h3>PDF API Error:</h3>
                        <pre>Status: ${response.status}\n${errorText}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('results').innerHTML = `
                    <h3>PDF API Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
