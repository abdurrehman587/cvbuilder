<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix User Role - CV Builder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
        }
        .error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fix User Role</h1>
        <p>This tool helps fix user roles for existing accounts that may have incorrect role assignments.</p>
        
        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" placeholder="Enter the email address" value="glorycomposing@gmail.com">
        </div>
        
        <div class="form-group">
            <label for="role">Correct Role:</label>
            <select id="role">
                <option value="shopkeeper">Shopkeeper</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        
        <button onclick="fixRole()">Fix User Role</button>
        
        <div id="result" class="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        async function fixRole() {
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const resultDiv = document.getElementById('result');
            
            if (!email) {
                showResult('Please enter an email address', 'error');
                return;
            }
            
            try {
                // Initialize Supabase
                if (typeof window.supabaseDatabaseManager === 'undefined') {
                    throw new Error('Supabase not initialized');
                }
                
                const supabase = window.supabaseDatabaseManager.supabase;
                
                // First, try to sign in with the email
                const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: prompt('Please enter the password for this account:')
                });
                
                if (signInError) {
                    throw new Error(`Sign in failed: ${signInError.message}`);
                }
                
                // Update user metadata
                const { error: updateError } = await supabase.auth.updateUser({
                    data: {
                        role: role,
                        name: signInData.user.user_metadata?.name || email.split('@')[0],
                        shopName: signInData.user.user_metadata?.shopName || null
                    }
                });
                
                if (updateError) {
                    throw new Error(`Failed to update role: ${updateError.message}`);
                }
                
                showResult(`✅ User role successfully updated to ${role} for ${email}`, 'success');
                
                // Sign out
                await supabase.auth.signOut();
                
            } catch (error) {
                console.error('Error fixing role:', error);
                showResult(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
