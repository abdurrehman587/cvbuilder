<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Shop Name</title>
</head>
<body>
    <h1>Debug Shop Name</h1>
    <div id="debug-info"></div>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-database.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const debugDiv = document.getElementById('debug-info');
            
            // Check if user is authenticated
            if (AuthSystem && AuthSystem.isAuthenticated()) {
                const currentUser = AuthSystem.getCurrentUser();
                debugDiv.innerHTML = `
                    <h2>Current User Data:</h2>
                    <pre>${JSON.stringify(currentUser, null, 2)}</pre>
                    
                    <h2>localStorage Users:</h2>
                    <pre>${JSON.stringify(JSON.parse(localStorage.getItem('cvBuilder_users') || '[]'), null, 2)}</pre>
                    
                    <h2>localStorage User:</h2>
                    <pre>${JSON.stringify(JSON.parse(localStorage.getItem('cvBuilder_user') || '{}'), null, 2)}</pre>
                `;
            } else {
                debugDiv.innerHTML = '<p>No user authenticated</p>';
            }
        });
    </script>
</body>
</html>
