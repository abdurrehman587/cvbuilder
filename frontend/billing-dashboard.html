<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Dashboard - CV Builder</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .billing-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .billing-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .billing-header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 600;
        }
        
        .billing-header p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #666;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .billing-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .shopkeeper-list {
            display: grid;
            gap: 15px;
        }
        
        .shopkeeper-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .shopkeeper-info h3 {
            margin: 0 0 5px 0;
            color: #333;
            font-size: 1.1rem;
        }
        
        .shopkeeper-info p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }
        
        .shopkeeper-stats {
            text-align: right;
        }
        
        .download-count {
            font-size: 1.5rem;
            font-weight: 700;
            color: #28a745;
            margin-bottom: 5px;
        }
        
        .download-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .billing-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .date-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .date-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .filter-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .filter-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="billing-container">
        <!-- Header -->
        <div class="billing-header">
            <h1>💰 Billing Dashboard</h1>
            <p>Track CV downloads and manage shopkeeper billing</p>
        </div>

        <!-- Overall Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalDownloads">0</div>
                <div class="stat-label">Total Downloads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalShopkeepers">0</div>
                <div class="stat-label">Active Shopkeepers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRevenue">$0</div>
                <div class="stat-label">Estimated Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgDownloads">0</div>
                <div class="stat-label">Avg Downloads/Shopkeeper</div>
            </div>
        </div>

        <!-- Date Filter -->
        <div class="billing-section">
            <div class="section-title">📅 Filter by Date Range</div>
            <div class="date-filter">
                <input type="date" id="startDate" class="date-input">
                <span>to</span>
                <input type="date" id="endDate" class="date-input">
                <button onclick="filterByDate()" class="filter-btn">Filter</button>
                <button onclick="resetFilter()" class="filter-btn">Reset</button>
            </div>
        </div>

        <!-- Shopkeeper Downloads -->
        <div class="billing-section">
            <div class="section-title">🏪 Shopkeeper Download Statistics</div>
            <div id="shopkeeperList" class="shopkeeper-list">
                <div class="loading">Loading shopkeeper data...</div>
            </div>
        </div>

        <!-- Billing Actions -->
        <div class="billing-section">
            <div class="section-title">💳 Billing Actions</div>
            <div class="billing-actions">
                <button onclick="exportBillingData()" class="btn btn-primary">📊 Export Billing Report</button>
                <button onclick="generateInvoices()" class="btn btn-success">🧾 Generate Invoices</button>
                <button onclick="refreshData()" class="btn btn-primary">🔄 Refresh Data</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-database.js"></script>
    <script>
        class BillingDashboard {
            constructor() {
                this.shopkeepers = [];
                this.downloads = [];
                this.filteredDownloads = [];
                this.pricePerDownload = 0.50; // $0.50 per download
            }

            async init() {
                await this.loadData();
                this.setupEventListeners();
            }

            async loadData() {
                try {
                    // Load shopkeepers
                    await this.loadShopkeepers();
                    
                    // Load downloads
                    await this.loadDownloads();
                    
                    // Update UI
                    this.updateStats();
                    this.updateShopkeeperList();
                    
                } catch (error) {
                    console.error('Error loading billing data:', error);
                    this.showError('Failed to load billing data. Please try again.');
                }
            }

            async loadShopkeepers() {
                try {
                    const { data, error } = await window.supabaseDatabaseManager.supabase
                        .from('shopkeeper_cvs')
                        .select('shopkeeper_id, shop_name')
                        .group('shopkeeper_id, shop_name');

                    if (error) {
                        console.error('Error loading shopkeepers:', error);
                        return;
                    }

                    this.shopkeepers = data || [];
                } catch (error) {
                    console.error('Error in loadShopkeepers:', error);
                }
            }

            async loadDownloads() {
                try {
                    const { data, error } = await window.supabaseDatabaseManager.supabase
                        .from('cv_downloads')
                        .select('*')
                        .order('downloaded_at', { ascending: false });

                    if (error) {
                        console.error('Error loading downloads:', error);
                        if (error.code === 'PGRST116' || error.message.includes('relation "cv_downloads" does not exist')) {
                            this.showError('Download tracking table not found. Please run the SQL script to create it.');
                        }
                        return;
                    }

                    this.downloads = data || [];
                    this.filteredDownloads = [...this.downloads];
                } catch (error) {
                    console.error('Error in loadDownloads:', error);
                }
            }

            updateStats() {
                const totalDownloads = this.filteredDownloads.length;
                const totalShopkeepers = this.shopkeepers.length;
                const totalRevenue = totalDownloads * this.pricePerDownload;
                const avgDownloads = totalShopkeepers > 0 ? Math.round(totalDownloads / totalShopkeepers) : 0;

                document.getElementById('totalDownloads').textContent = totalDownloads.toLocaleString();
                document.getElementById('totalShopkeepers').textContent = totalShopkeepers;
                document.getElementById('totalRevenue').textContent = `$${totalRevenue.toFixed(2)}`;
                document.getElementById('avgDownloads').textContent = avgDownloads;
            }

            updateShopkeeperList() {
                const container = document.getElementById('shopkeeperList');
                
                if (this.shopkeepers.length === 0) {
                    container.innerHTML = '<div class="loading">No shopkeepers found.</div>';
                    return;
                }

                const shopkeeperStats = this.calculateShopkeeperStats();
                
                container.innerHTML = shopkeeperStats.map(shopkeeper => `
                    <div class="shopkeeper-item">
                        <div class="shopkeeper-info">
                            <h3>${shopkeeper.shopName || 'Unknown Shop'}</h3>
                            <p>ID: ${shopkeeper.shopkeeperId}</p>
                        </div>
                        <div class="shopkeeper-stats">
                            <div class="download-count">${shopkeeper.downloads}</div>
                            <div class="download-label">Downloads</div>
                            <div style="color: #28a745; font-weight: 600; margin-top: 5px;">
                                $${(shopkeeper.downloads * this.pricePerDownload).toFixed(2)}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            calculateShopkeeperStats() {
                return this.shopkeepers.map(shopkeeper => {
                    const downloads = this.filteredDownloads.filter(d => d.shopkeeper_id === shopkeeper.shopkeeper_id).length;
                    return {
                        ...shopkeeper,
                        downloads
                    };
                }).sort((a, b) => b.downloads - a.downloads);
            }

            filterByDate() {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;

                if (!startDate || !endDate) {
                    alert('Please select both start and end dates.');
                    return;
                }

                const start = new Date(startDate);
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999); // Include the entire end date

                this.filteredDownloads = this.downloads.filter(download => {
                    const downloadDate = new Date(download.downloaded_at);
                    return downloadDate >= start && downloadDate <= end;
                });

                this.updateStats();
                this.updateShopkeeperList();
            }

            resetFilter() {
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
                this.filteredDownloads = [...this.downloads];
                this.updateStats();
                this.updateShopkeeperList();
            }

            exportBillingData() {
                const data = this.calculateShopkeeperStats();
                const csv = this.convertToCSV(data);
                this.downloadCSV(csv, 'billing-report.csv');
            }

            convertToCSV(data) {
                const headers = ['Shop Name', 'Shopkeeper ID', 'Downloads', 'Revenue'];
                const rows = data.map(item => [
                    item.shopName || 'Unknown Shop',
                    item.shopkeeperId,
                    item.downloads,
                    (item.downloads * this.pricePerDownload).toFixed(2)
                ]);

                return [headers, ...rows].map(row => row.join(',')).join('\n');
            }

            downloadCSV(csv, filename) {
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                window.URL.revokeObjectURL(url);
            }

            generateInvoices() {
                alert('Invoice generation feature coming soon!');
            }

            async refreshData() {
                document.getElementById('shopkeeperList').innerHTML = '<div class="loading">Refreshing data...</div>';
                await this.loadData();
            }

            showError(message) {
                const container = document.getElementById('shopkeeperList');
                container.innerHTML = `<div class="error">${message}</div>`;
            }

            setupEventListeners() {
                // Set default date range to current month
                const now = new Date();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                
                document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
                document.getElementById('endDate').value = lastDay.toISOString().split('T')[0];
            }
        }

        // Initialize billing dashboard
        document.addEventListener('DOMContentLoaded', () => {
            const billingDashboard = new BillingDashboard();
            billingDashboard.init();
        });
    </script>
</body>
</html>
